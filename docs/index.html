<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Diceware Passphrase Generator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      color: #d4d4d4;
      font-family: monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-left: 1rem;
      padding-right: 1rem;
    }

    #wrapper {
      width: 46rem;
      max-width: 100%;
      margin-top: -8vh;
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-top: 2.5rem;
    }

    #grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1rem;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      opacity: 0.3;
      transition: opacity 0.3s;
    }

    .row.settled {
      opacity: 1;
    }

    .dice-group {
      display: flex;
      gap: 0.3rem;
      width: 13rem;
      flex-shrink: 0;
    }

    .die {
      font-size: 4rem;
      line-height: 1;
      display: inline-block;
      width: 3rem;
      text-align: center;
    }

    .word {
      font-size: 2rem;
      letter-spacing: 0.04em;
      color: #a0d0a0;
      text-align: left;
    }

    #regen {
      background: none;
      border: 1px solid #555;
      color: #d4d4d4;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
      margin-left: -3.5rem;
    }

    #regen:hover {
      border-color: #d4d4d4;
    }

    #regen:disabled {
      opacity: 0.4;
      cursor: default;
      border-color: #555;
    }
  </style>
</head>
<body>

  <div id="wrapper">
    <div id="grid"></div>

    <div class="controls">
      <button id="regen">Regenerate</button>
    </div>
  </div>

  <script src="lib/wordlist-short1.js"></script>
  <script src="lib/diceware.js"></script>
  <script>
    var grid = document.getElementById('grid');
    var regenBtn = document.getElementById('regen');
    var animating = false;
    var lastRolls = [];

    function buildGrid(wordCount, diceCount) {
      grid.textContent = '';
      for (var i = 0; i < wordCount; i++) {
        var row = document.createElement('div');
        row.className = 'row';

        var diceGroup = document.createElement('div');
        diceGroup.className = 'dice-group';
        for (var d = 0; d < diceCount; d++) {
          var die = document.createElement('span');
          die.className = 'die';
          die.textContent = DICE_FACES[0];
          diceGroup.appendChild(die);
        }

        var wordSpan = document.createElement('span');
        wordSpan.className = 'word';

        row.appendChild(diceGroup);
        row.appendChild(wordSpan);
        grid.appendChild(row);
      }
    }

    function animateDice(results) {
      var rows = grid.querySelectorAll('.row');
      var STAGGER = 350;
      var SETTLE_TIME = 400;
      var rightColumnStart = Math.floor((results.length - 1) / 2) * STAGGER + SETTLE_TIME;
      var total = results.length;
      var settled = 0;

      animating = true;
      regenBtn.disabled = true;

      for (var r = 0; r < rows.length; r++) {
        rows[r].classList.remove('settled');
        rows[r].querySelector('.word').textContent = '';
      }

      for (var r = 0; r < results.length; r++) {
        (function(idx) {
          var row = rows[idx];
          var diceEls = row.querySelectorAll('.die');
          var wordSpan = row.querySelector('.word');
          var delay;
          if (idx % 2 === 0) {
            delay = (idx / 2) * STAGGER;
          } else {
            delay = rightColumnStart + Math.floor(idx / 2) * STAGGER;
          }

          animateDiceRow(diceEls, wordSpan, results[idx], delay, function(wordEl, word) {
            row.classList.add('settled');
            wordEl.textContent = word;
            settled++;
            if (settled === total) {
              animating = false;
              regenBtn.disabled = false;
            }
          });
        })(r);
      }
    }

    function regenerate() {
      if (animating) return;
      var wc = 8;
      var diceCount = Math.round(Math.log(WORDLIST_SHORT1.length) / Math.log(6));

      if (lastRolls.length !== wc) {
        buildGrid(wc, diceCount);
      }

      lastRolls = generateDiceware(wc, WORDLIST_SHORT1);
      animateDice(lastRolls);
    }

    buildGrid(8, Math.round(Math.log(WORDLIST_SHORT1.length) / Math.log(6)));
    regenBtn.addEventListener('click', regenerate);
    regenerate();
  </script>
</body>
</html>
